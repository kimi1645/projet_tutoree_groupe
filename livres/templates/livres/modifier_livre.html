{% extends 'base.html' %}

{% block title %}
Modifier le livre
{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="card card-soft shadow-sm border-0">
      <div class="card-body p-4">
        <div class="text-center">
          <h2 class="h4 mb-3">Modifier le livre</h2>
        </div>
        <form method="post" class="row g-3">
          {% csrf_token %}
          {{ form }}
          <div class="col-12 text-end">
            <div class="text-center ">
              <button type="submit" class="btn btn-primary rounded-pill w-50">Sauvegarder</button>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
