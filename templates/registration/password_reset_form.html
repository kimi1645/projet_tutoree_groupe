<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Réainitialisation de mots de passe</title>
  </head>
  <body>
    <h2>Réinitialisation du mot de passe</h2>
    <p>Saisissez votre adresse email ci-dessous. Nous vous enverrons un lien pour créer un nouveau mot de passe.</p>

    <form method="post">
      {% csrf_token %}
      {{ form.email.label_tag }}
      {{ form.email }}

      {% if form.email.errors %}
        <div style="color: red;">{{ form.email.errors }}</div>
      {% endif %}

      <button type="submit" style="margin-top: 10px;">Envoyer l'email de réinitialisation</button>
    </form>
  </body>
</html>
