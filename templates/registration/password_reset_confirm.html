<h2>Choisir un nouveau mot de passe</h2>

{% if validlink %}
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Confirmer le nouveau mot de passe</button>
  </form>
{% else %}
  <p style="color: red;">Le lien de réinitialisation est invalide ou a expiré. Veuillez recommencer la procédure.</p>
{% endif %}
