{% extends 'base.html' %}

{% block title %}
  Chatbot
{% endblock %}

{% block content %}
  {% load static %}
  <link rel="stylesheet" href="{% static 'css/chat.css' %}" />
  <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}" />
  <div class="chat-container">
    <div id="chatbox"></div>
    <div>
      <div class="chat-input">
        <input type="text" id="userInput" placeholder="Posez votre question..." />
        <button onclick="envoyerMessage()" class="btn btn-primary"><strong>Envoyer</strong></button>
      </div>
    </div>
  </div>
  <script>
    // Historique des messages
    let historique = []
    
    async function envoyerMessage() {
      const input = document.getElementById('userInput')
      const chatbox = document.getElementById('chatbox')
      const message = input.value.trim()
    
      if (!message) return
    
      // Afficher message utilisateur
      chatbox.innerHTML += `<div class="d-flex justify-content-end"><div class="message user alert alert-secondary"><p>${message}</p></div></div>`
    
      input.value = ''
      chatbox.scrollTop = chatbox.scrollHeight
    
      // Afficher indicateur de chargement
      chatbox.innerHTML += `<div class="message bot" id="loading"><p>...</p></div>`
    
      // Envoyer à Django le message avec une fonction asynchrone
      const response = await fetch("{% url 'chatbot' %}", {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-CSRFToken': '{{ csrf_token }}'
        }, //Ajout token csrf pour éviter l'erreur
        body: JSON.stringify({ message: message }) //Message à envoyé au format json
      })
    
      const data = await response.json() //Stockage reponse dans une variable
    
      // Supprimer chargement et afficher réponse
      document.getElementById('loading').remove()
    
      chatbox.innerHTML += `<div class="message bot"><p>🤖 ${data.response}</p></div>`
    
      chatbox.scrollTop = chatbox.scrollHeight
    }
    
    // Envoyer avec Entrée
    document.getElementById('userInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') envoyerMessage()
    })
    
    // Charger l'historique depuis la BDD
    async function chargerHistorique() {
      const response = await fetch("{% url 'chargerHistorique' %}")
      const data = await response.json()
      const chatbox = document.getElementById('chatbox')
    
      // On itère l'historique du message
      data.historique.forEach((item) => {
        chatbox.innerHTML += item.role === 'user' ? `<div class="d-flex justify-content-end p-0.5"><div class="message user alert alert-secondary"><p>${item.message}</p></div></div>` : `<div class="message bot alert alert-light"><p>🤖 ${item.message}</p></div>`
      })
      chatbox.scrollTop = chatbox.scrollHeight
    }
    
    //On recharge l'historique à chaque chargment de la page
    document.addEventListener('DOMContentLoaded', chargerHistorique)
  </script>
{% endblock %}
